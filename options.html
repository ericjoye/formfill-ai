<!DOCTYPE html>

</style>
</head>
<body>
<h1>FormFill AI — Options</h1>

<select id="provider">

</select>
<label>API Key:</label>
<input type="password" id="apiKey" placeholder="sk-...">
<label>Model:</label>
<input type="text" id="model" placeholder="claude-sonnet-4-20250514">
<button id="save">Save Settings</button>
<script src="options.js"></script>
</body>
</html>
